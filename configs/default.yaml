# ── Environment ───────────────────────────────────────────────────
env:
  num_teams: 10
  budget_cr: 100
  max_squad_size: 19
  min_squad_size: 15
  max_overseas: 5
  auction_timer_steps: 8      # steps per player before hammer falls
  unsold_price_factor: 0.5    # base price halved in unsold round

# ── Training ──────────────────────────────────────────────────────
training:
  total_episodes: 50000
  num_envs: 4                 # parallel environments
  rollout_steps: 512          # steps per rollout before update
  ppo_epochs: 4               # epochs per update
  minibatch_size: 64
  gamma: 0.99                 # discount factor
  gae_lambda: 0.95            # GAE smoothing
  clip_epsilon: 0.2           # PPO clip
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  lr: 3.0e-4
  lr_decay: true
  value_normalize: true       # normalize value targets (key MAPPO trick)

# ── Network ───────────────────────────────────────────────────────
network:
  obs_dim: 65                 # per-agent observation size
  global_state_dim: 650       # centralized critic input
  hidden_dim: 128
  num_layers: 2
  activation: tanh
  use_orthogonal_init: true
  parameter_sharing: true     # all agents share one network

# ── Reward ────────────────────────────────────────────────────────
reward:
  final_score_weight: 1.0
  completeness_bonus: 0.3     # intermediate: meeting role minimums
  budget_waste_penalty: 0.05  # penalty for ending with >30Cr unspent
  overseas_bonus: 0.1         # reward for using overseas slots well

# ── Logging ───────────────────────────────────────────────────────
logging:
  log_interval: 100           # episodes between console logs
  save_interval: 1000         # episodes between checkpoints
  eval_interval: 2000         # episodes between evaluations
  eval_episodes: 50
  use_wandb: false            # set true when you have wandb set up
  wandb_project: ipl-auction-rl
  results_dir: results
